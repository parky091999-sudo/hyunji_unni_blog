name: 워드프레스 심층분석 자동발행

# 2026-07-08부터 매일 9시(KST) 심층분석 1편 자동발행(WP_PIPELINE.md §5 C단계).
# 주제는 scripts/wp_post.py가 이력(data/wp_post_history.json) 기반으로 자동 로테이션.
# 9월까지는 사람이 매일 라이브 글을 리뷰하며 오류수정·개선하는 관찰 기간 — 애드센스 연결 전.
on:
  schedule:
    - cron: "5 0 * * *"   # KST 09:05 (정각은 GH 큐 혼잡 회피를 위해 :05 오프셋 — 기존 워크플로 패턴)
  workflow_dispatch:
    inputs:
      topic:
        description: "주제 (비우면 자동 로테이션 — scripts/wp_dry.py TOPICS)"
        required: false
        default: ""
      status:
        description: "발행 상태"
        required: false
        type: choice
        options:
          - publish
          - draft
        default: publish

concurrency:
  group: wp-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 심층분석 생성·발행
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          WP_URL:     ${{ secrets.WP_URL }}
          WP_USER:    ${{ secrets.WP_USER }}
          WP_APP_PW:  ${{ secrets.WP_APP_PW }}
          WP_TOPIC:   ${{ github.event.inputs.topic || '' }}
          WP_STATUS:  ${{ github.event.inputs.status || 'publish' }}
        run: python -m scripts.wp_post

      - name: 발행 이력 커밋
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wp_post_history.json
          git diff --staged --quiet || git commit -m "chore: 워드프레스 발행 이력 $(date +'%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push
