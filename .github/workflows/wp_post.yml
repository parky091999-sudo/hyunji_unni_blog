name: 워드프레스 심층분석 자동발행

# 주 4회(월·화·목·토 09:05 KST) — 수익 허브별 심층 칼럼 (WP_PIPELINE.md §5 C).
# 주제: scripts/wp_post.py 허브 로테이션 + 네이버 7일 키워드 회피.
on:
  schedule:
    - cron: "5 0 * * 1"   # 월 KST 09:05 — 연금·절세 (짝수주 대출·신용)
    - cron: "5 0 * * 2"   # 화 — 보험·리스크
    - cron: "5 0 * * 4"   # 목 — 세금·환급
    - cron: "5 0 * * 6"   # 토 — 주거·청약 (짝수주 제도·복지)
  workflow_dispatch:
    inputs:
      topic:
        description: "주제 (비우면 자동 로테이션 — scripts/wp_dry.py TOPICS)"
        required: false
        default: ""
      status:
        description: "발행 상태"
        required: false
        type: choice
        options:
          - publish
          - draft
        default: publish

concurrency:
  group: wp-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 심층분석 생성·발행
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          WP_URL:     ${{ secrets.WP_URL }}
          WP_USER:    ${{ secrets.WP_USER }}
          WP_APP_PW:  ${{ secrets.WP_APP_PW }}
          WP_TOPIC:   ${{ github.event.inputs.topic || '' }}
          WP_STATUS:  ${{ github.event.inputs.status || 'publish' }}
        run: python -m scripts.wp_post

      - name: 발행 이력 커밋
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wp_post_history.json
          git diff --staged --quiet || git commit -m "chore: 워드프레스 발행 이력 $(date +'%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push
