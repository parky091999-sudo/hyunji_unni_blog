name: 형수의테크공장 포스팅

on:
  schedule:
    - cron: "0 0 * * *"    # KST 09:00
    - cron: "0 12 * * *"   # KST 21:00
  workflow_dispatch:
    inputs:
      force_post:
        description: "강제 실행 (true/false)"
        required: false
        default: "false"
      draft:
        description: "임시저장 검증 모드 (true/false)"
        required: false
        default: "false"
      fmt:
        description: "형식 강제 (breaking/explain/pick/compare, 비우면 자동 로테이션)"
        required: false
        default: ""

concurrency:
  group: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.draft == 'true') && format('naver-tech-draft-{0}', github.run_id) || 'naver-tech-post' }}
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum && sudo fc-cache -f

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 랜덤 딜레이 (봇 패턴 방지)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 900))
          echo "랜덤 딜레이: ${DELAY}초 (최대 15분)"
          sleep $DELAY

      - name: 실행 슬롯 설정 (중복 방지용)
        run: |
          HOUR=$(TZ='Asia/Seoul' date '+%H')
          echo "RUN_SLOT=$HOUR" >> $GITHUB_ENV

      - name: 포스팅 실행
        env:
          TECH_NAVER_ID:      ${{ secrets.TECH_NAVER_ID }}
          TECH_NAVER_PW:      ${{ secrets.TECH_NAVER_PW }}
          TECH_NAVER_BLOG_ID: ${{ secrets.TECH_NAVER_BLOG_ID }}
          TECH_NAVER_COOKIES: ${{ secrets.TECH_NAVER_COOKIES }}
          GOOGLE_API_KEY:     ${{ secrets.GOOGLE_API_KEY }}
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          FORCE_POST:  ${{ github.event.inputs.force_post || 'false' }}
          DRAFT:       ${{ github.event.inputs.draft || 'false' }}
          FORCE_FMT:   ${{ github.event.inputs.fmt || '' }}
          RUN_SLOT:    ${{ env.RUN_SLOT }}
        run: python -m scripts.tech_post

      - name: 스크린샷 아티팩트 업로드 (디버그)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tech-screenshots-${{ github.run_id }}
          path: data/screenshots/
          if-no-files-found: ignore
          retention-days: 3

      - name: 포스팅 이력 커밋
        if: github.event.inputs.draft != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tech_history.json
          git diff --staged --quiet || git commit -m "chore: 형수의테크공장 포스팅 이력 $(date +'%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push
