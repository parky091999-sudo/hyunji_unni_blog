name: 속보 트리거 (2시간 간격 이슈 스캔)

on:
  schedule:
    # KST 09~23시대 2시간 간격(:23 혼잡 회피). 대형 이슈 감지 시 tech/stock 발행 즉시 디스패치.
    - cron: "23 0,2,4,6,8,10,12,14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: breaking-trigger
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치 (경량)
        run: pip install -q google-genai python-dotenv requests

      - name: 이슈 스캔·판정·디스패치
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m scripts.breaking_trigger

      - name: 이력 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/breaking_history.json || true
          git diff --staged --quiet || git commit -m "chore: 속보 트리거 이력 $(date -u +%Y-%m-%d-%H%M)"
          git pull --rebase --autostash -q origin main
          git push -q || (git pull --rebase --autostash -q origin main && git push -q)
