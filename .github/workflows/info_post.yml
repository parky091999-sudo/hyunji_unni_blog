name: 고CPC 정보성 포스팅 (금융·세금·보험·부동산)

on:
  # ⏸️ 스케줄 미설정 (최적화/검증 기간). 리런치 시 카테고리별 schedule 추가.
  workflow_dispatch:
    inputs:
      category:
        description: "카테고리"
        required: true
        type: choice
        options:
          - 금융재테크
          - 세금절세
          - 보험
          - 부동산주거
        default: 금융재테크
      force_post:
        description: "강제 실행 (true/false)"
        required: false
        default: "false"
      draft:
        description: "임시저장 검증 모드 (true/false)"
        required: false
        default: "false"

concurrency:
  group: naver-info-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum && sudo fc-cache -f

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 실행 슬롯 설정 (중복 방지용)
        run: |
          HOUR=$(TZ='Asia/Seoul' date '+%H')
          echo "RUN_SLOT=$HOUR" >> $GITHUB_ENV

      - name: 포스팅 실행
        env:
          NAVER_ID:       ${{ secrets.NAVER_ID }}
          NAVER_PW:       ${{ secrets.NAVER_PW }}
          NAVER_BLOG_ID:  ${{ secrets.NAVER_BLOG_ID }}
          NAVER_COOKIES:  ${{ secrets.NAVER_COOKIES }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          INFO_CATEGORY:  ${{ github.event.inputs.category }}
          FORCE_POST:     ${{ github.event.inputs.force_post || 'false' }}
          DRAFT:          ${{ github.event.inputs.draft || 'false' }}
          RUN_SLOT:       ${{ env.RUN_SLOT }}
        run: python -m scripts.info_post

      - name: 스크린샷 아티팩트 업로드 (디버그)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: info-screenshots-${{ github.run_id }}
          path: data/screenshots/
          if-no-files-found: ignore
          retention-days: 3

      - name: 포스팅 이력 커밋
        if: github.event.inputs.draft != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/info_*_history.json
          git diff --staged --quiet || git commit -m "chore: 정보성 포스팅 이력 $(date +'%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push
