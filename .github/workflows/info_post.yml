name: 고CPC 정보성 포스팅 (금융·세금·보험·부동산)

on:
  # 리런치(2026-06-30): 카테고리별 매일 1개 = 정보 4카테고리 하루 4회(자동순환=가장 오래된것 선택 → 4개 모두 매일 1개).
  schedule:
    # 정각(:00)은 GH Actions 큐 혼잡으로 스킵·지연 빈번 → :05 분산 + 스케줄 재등록
    - cron: "5 4 * * *"   # KST 13:05
    - cron: "5 6 * * *"   # KST 15:05
    - cron: "5 8 * * *"   # KST 17:05
    - cron: "5 10 * * *"  # KST 19:05
  workflow_dispatch:
    inputs:
      category:
        description: "카테고리"
        required: true
        type: choice
        options:
          - 금융재테크
          - 세금절세
          - 보험
          - 부동산주거
        default: 금융재테크
      force_post:
        description: "강제 실행 (true/false)"
        required: false
        default: "false"
      draft:
        description: "임시저장 검증 모드 (true/false)"
        required: false
        default: "false"

concurrency:
  # DRAFT 검증 런은 run_id로 독립 그룹 → 스케줄 실발행 큐를 막지 않음.
  # 스케줄·실발행(비draft) dispatch는 공용 그룹 유지(중복발행 방지 직렬화).
  group: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.draft == 'true') && format('naver-info-draft-{0}', github.run_id) || 'naver-info-post' }}
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum && sudo fc-cache -f

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 랜덤 딜레이 (봇 패턴 방지)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 900))
          echo "랜덤 딜레이: ${DELAY}초 (최대 15분)"
          sleep $DELAY

      - name: 실행 슬롯 설정 (중복 방지용)
        run: |
          # GH 스케줄러 지연 시 HOUR 드리프트 → cron 문자열로 슬롯 확정 (stock_post 패턴)
          case "${{ github.event.schedule }}" in
            "5 4 * * *"|"0 4 * * *")  SLOT="13" ;;
            "5 6 * * *"|"0 6 * * *")  SLOT="15" ;;
            "5 8 * * *"|"0 8 * * *")  SLOT="17" ;;
            "5 10 * * *"|"0 10 * * *") SLOT="19" ;;
            *) SLOT=$(TZ='Asia/Seoul' date '+%H') ;;
          esac
          echo "RUN_SLOT=$SLOT" >> $GITHUB_ENV
          echo "슬롯 확정: $SLOT (schedule='${{ github.event.schedule }}')"

      - name: 포스팅 실행
        env:
          NAVER_ID:       ${{ secrets.NAVER_ID }}
          NAVER_PW:       ${{ secrets.NAVER_PW }}
          NAVER_BLOG_ID:  ${{ secrets.NAVER_BLOG_ID }}
          NAVER_COOKIES:  ${{ secrets.NAVER_COOKIES }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          FSS_API_KEY:         ${{ secrets.FSS_API_KEY }}
          INFO_CATEGORY:  ${{ github.event.inputs.category }}
          FORCE_POST:     ${{ github.event.inputs.force_post || 'false' }}
          DRAFT:          ${{ github.event.inputs.draft || 'false' }}
          RUN_SLOT:       ${{ env.RUN_SLOT }}
        run: python -m scripts.info_post

      - name: 스크린샷 아티팩트 업로드 (디버그)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: info-screenshots-${{ github.run_id }}
          path: data/screenshots/
          if-no-files-found: ignore
          retention-days: 3

      - name: 포스팅 이력 커밋
        if: github.event.inputs.draft != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/info_*_history.json
          git diff --staged --quiet || git commit -m "chore: 정보성 포스팅 이력 $(date +'%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push
