name: 네이버 블로그 레시피 포스팅

on:
  schedule:
    # 매일 KST 17:00 (UTC 08:00) — 살림글(10시)과 시간대 분리
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      force_post:
        description: "오늘 이미 포스팅했어도 강제 실행 (true/false)"
        required: false
        default: "false"
      draft:
        description: "임시저장 검증 모드 — 공개 발행 없이 본문/이미지만 확인 (true/false)"
        required: false
        default: "false"

# 살림글 워크플로와 같은 그룹 → 두 글이 동시에 네이버 로그인/push 하지 않도록 직렬화
concurrency:
  group: naver-daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 한글 폰트 설치 (카드뉴스 렌더링용)
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum && sudo fc-cache -f

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 랜덤 딜레이 (봇 패턴 방지)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 1800))
          echo "랜덤 딜레이: ${DELAY}초 (최대 30분)"
          sleep $DELAY

      - name: 레시피 포스팅 실행
        env:
          NAVER_ID:       ${{ secrets.NAVER_ID }}
          NAVER_PW:       ${{ secrets.NAVER_PW }}
          NAVER_BLOG_ID:  ${{ secrets.NAVER_BLOG_ID }}
          NAVER_COOKIES:  ${{ secrets.NAVER_COOKIES }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          FORCE_POST:     ${{ github.event.inputs.force_post || 'false' }}
          DRAFT:          ${{ github.event.inputs.draft || 'false' }}
        run: python -m scripts.recipe_post

      - name: 스크린샷 아티팩트 업로드 (디버그)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: data/screenshots/
          if-no-files-found: ignore
          retention-days: 3

      - name: 레시피 이력 커밋
        if: github.event.inputs.draft != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/recipe_history.json
          git diff --staged --quiet || git commit -m "chore: 레시피 이력 $(date +'%Y-%m-%d')"
          git pull --rebase --autostash origin main
          git push
